apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: paifgames-ns
  labels:
    io.kompose.service: sqlserver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      io.kompose.service: sqlserver
  template:
    metadata:
      labels:
        io.kompose.service: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: fix-volume-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/opt/mssql
              chown -R 10001:10001 /var/opt/mssql
              chmod -R g+rwX /var/opt/mssql
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: MSSQL_SA_PASSWORD
              value: "Paif@123456"
          ports:
            - containerPort: 1433
              protocol: TCP
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
          livenessProbe:
            exec:
              command:
                - /opt/mssql-tools18/bin/sqlcmd
                - -C
                - -S
                - localhost
                - -U
                - sa
                - -P
                - Paif@123456
                - -Q
                - SELECT 1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            exec:
              command:
                - /opt/mssql-tools18/bin/sqlcmd
                - -C
                - -S
                - localhost
                - -U
                - sa
                - -P
                - Paif@123456
                - -Q
                - SELECT 1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
