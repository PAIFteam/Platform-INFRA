apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: paif
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: "Developer"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paif-shared-secrets
                  key: SA_PASSWORD
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
          readinessProbe:
            tcpSocket: { port: 1433 }
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 1433 }
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: paif
spec:
  selector:
    app: sqlserver
  ports:
    - name: tds
      port: 1433
      targetPort: 1433
  type: ClusterIP
