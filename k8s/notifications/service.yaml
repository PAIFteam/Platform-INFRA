apiVersion: v1
kind: Service
metadata:
  name: notifications-api
  namespace: paif
spec:
  selector:
    app: notifications-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-api-node
  namespace: paif
spec:
  selector:
    app: notifications-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30003
  type: NodePort
