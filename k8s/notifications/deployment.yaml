apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-api
  namespace: paif
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-api
  template:
    metadata:
      labels:
        app: notifications-api
    spec:
      containers:
        - name: notifications-api
          image: notifications-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: paif-shared-config }
            - secretRef: { name: paif-shared-secrets }
            - configMapRef: { name: notifications-config }
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
